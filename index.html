<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レトロ月面着陸ゲーム - ジグザグ山岳編</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            border: 2px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .ui-container {
            margin-top: 10px;
            font-size: 16px;
            text-align: center;
        }
        .controls {
            margin-top: 5px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div class="ui-container">
        <div>操作方法: <strong>【↑ / W / スペース】で主噴射</strong> | <strong>【←, → / A, D】で機体傾け</strong></div>
        <div class="controls">※緑色の平らな場所を見つけて、速度を落として着陸してください！</div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ゲーム状態管理
let gameState = "PLAYING"; 
let message = "";

// 宇宙船のパラメータ
const ship = {
    x: 400,
    y: 50,
    vx: 1.5,
    vy: 0,
    angle: 0, 
    fuel: 1000,
    isThrusting: false,
    width: 20,
    height: 30
};

// 環境定数
const GRAVITY = 0.04;
const THRUST = 0.12;
const ROTATE_SPEED = 0.05;

// 地形データ
const terrainPoints = [];
const numPoints = 40; // ジグザグの細かさ
let padStartIndex = 0; // 着陸パッドが始まる点のインデックス
const padWidthPoints = 4; // 着陸パッドの広さ（点の個数分）

// キー入力状態
const keys = {};

window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
    if (gameState !== "PLAYING" && (e.key === " " || e.key === "Enter" || e.key === "ArrowUp" || e.key === "w")) {
        resetGame();
    }
});
window.addEventListener("keyup", (e) => { keys[e.key] = false; });

// ジグザグ地形の生成関数
function generateTerrain() {
    terrainPoints.length = 0;
    const segmentWidth = canvas.width / (numPoints - 1);
    
    // ランダムに着陸ゾーンの開始位置を決める（端すぎない場所）
    padStartIndex = Math.floor(Math.random() * (numPoints - padWidthPoints - 6)) + 3;
    
    // 一定の高さベース
    const baseHeight = 420;
    let currentY = baseHeight;

    for (let i = 0; i < numPoints; i++) {
        const x = i * segmentWidth;
        
        if (i >= padStartIndex && i < padStartIndex + padWidthPoints) {
            // 着陸パッドの区間は完全に平らにする
            if (i === padStartIndex) {
                currentY = Math.random() * 80 + 380; // パッドの高さをランダム決定
            }
            terrainPoints.push({ x: x, y: currentY, isPad: true });
        } else {
            // それ以外はジグザグに上下させる
            currentY = baseHeight + (Math.random() * 100 - 50);
            // 画面外に飛び出さないよう制限
            if (currentY > canvas.height - 20) currentY = canvas.height - 20;
            if (currentY < 300) currentY = 300;
            
            terrainPoints.push({ x: x, y: currentY, isPad: false });
        }
    }
}

// 特定のX座標における地形のY座標（高さを取得する）
function getTerrainHeightAt(x) {
    if (x < 0) x = 0;
    if (x > canvas.width) x = canvas.width;

    const segmentWidth = canvas.width / (numPoints - 1);
    const index = Math.floor(x / segmentWidth);
    const nextIndex = Math.min(index + 1, numPoints - 1);
    
    // 2点間の比率を計算（線形補間）
    const t = (x - (index * segmentWidth)) / segmentWidth;
    const y = terrainPoints[index].y + (terrainPoints[nextIndex].y - terrainPoints[index].y) * t;
    
    // その位置が着陸パッドの上かどうか
    const isPad = terrainPoints[index].isPad && terrainPoints[nextIndex].isPad;
    
    return { y, isPad };
}

function resetGame() {
    generateTerrain();
    ship.x = Math.random() * 400 + 200;
    ship.y = 50;
    ship.vx = Math.random() * 3 - 1.5;
    ship.vy = 0;
    ship.angle = (Math.random() * 0.4) - 0.2;
    ship.fuel = 1000;
    ship.isThrusting = false;
    gameState = "PLAYING";
    message = "";
}

function update() {
    if (gameState !== "PLAYING") return;

    // 回転
    if (keys["ArrowLeft"] || keys["a"] || keys["A"]) ship.angle -= ROTATE_SPEED;
    if (keys["ArrowRight"] || keys["d"] || keys["D"]) ship.angle += ROTATE_SPEED;

    // 噴射
    ship.isThrusting = false;
    if ((keys["ArrowUp"] || keys["w"] || keys["W"] || keys[" "]) && ship.fuel > 0) {
        ship.isThrusting = true;
        ship.fuel -= 2;
        ship.vx += Math.sin(ship.angle) * THRUST;
        ship.vy -= Math.cos(ship.angle) * THRUST;
    }

    ship.vy += GRAVITY;
    ship.x += ship.vx;
    ship.y += ship.vy;

    if (ship.x < 0) ship.x = canvas.width;
    if (ship.x > canvas.width) ship.x = 0;

    // 地形との当たり判定
    const terrainInfo = getTerrainHeightAt(ship.x);
    const shipBottom = ship.y + ship.height / 2;

    if (shipBottom >= terrainInfo.y) {
        const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
        const angleDeg = Math.abs((ship.angle * 180 / Math.PI) % 360);

        if (terrainInfo.isPad) {
            // 着陸パッド上での判定
            if (speed < 3.0 && (angleDeg < 10 || angleDeg > 350)) {
                gameState = "SUCCESS";
                message = "ナイス着陸！ ミッション完了！";
            } else {
                gameState = "GAMEOVER";
                message = speed >= 3.0 ? "クラッシュ：速度が速すぎます！" : "クラッシュ：機体が傾いています！";
            }
        } else {
            // 普通のジグザグ斜面に激突
            gameState = "GAMEOVER";
            message = "大破：岩山に激突しました！";
        }
        
        // 位置を地形の表面に固定
        ship.y = terrainInfo.y - ship.height / 2;
        ship.vy = 0;
        ship.vx = 0;
        ship.isThrusting = false;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 星の描画
    ctx.fillStyle = "#fff";
    for(let i=0; i<15; i++) {
        ctx.fillRect((i*149)%canvas.width, (i*89)%canvas.height, 2, 2);
    }

    // ジグザグ地形の描画
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    for (let i = 0; i < numPoints; i++) {
        ctx.lineTo(terrainPoints[i].x, terrainPoints[i].y);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.closePath();
    ctx.fillStyle = "#3c3c3c";
    ctx.fill();
    ctx.strokeStyle = "#888";
    ctx.lineWidth = 2;
    ctx.stroke();

    // 着陸パッド（緑色の線）を重ねて描画
    ctx.beginPath();
    let padStarted = false;
    for (let i = 0; i < numPoints; i++) {
        if (terrainPoints[i].isPad) {
            if (!padStarted) {
                ctx.moveTo(terrainPoints[i].x, terrainPoints[i].y);
                padStarted = true;
            } else {
                ctx.lineTo(terrainPoints[i].x, terrainPoints[i].y);
            }
        }
    }
    ctx.strokeStyle = "#0f0";
    ctx.lineWidth = 4;
    ctx.stroke();

    // 宇宙船の描画
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.fillStyle = "#222";
    ctx.beginPath();
    ctx.moveTo(0, -ship.height / 2);
    ctx.lineTo(ship.width / 2, ship.height / 2);
    ctx.lineTo(-ship.width / 2, ship.height / 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    if (ship.isThrusting && gameState === "PLAYING") {
        ctx.fillStyle = "#f50";
        ctx.beginPath();
        ctx.moveTo(-ship.width / 4, ship.height / 2);
        ctx.lineTo(0, ship.height / 2 + (10 + Math.random() * 15));
        ctx.lineTo(ship.width / 4, ship.height / 2);
        ctx.closePath();
        ctx.fill();
    }
    ctx.restore();

    // UIの描画
    const currentSpeed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
    ctx.fillStyle = currentSpeed < 3.0 ? "#0f0" : "#f33";
    ctx.font = "16px monospace";
    ctx.fillText(`横速度: ${ship.vx.toFixed(2)}`, 20, 30);
    ctx.fillText(`縦速度: ${ship.vy.toFixed(2)}`, 20, 50);
    ctx.fillText(`合計速度: ${currentSpeed.toFixed(2)} (目標: 3.00未満)`, 20, 70);

    ctx.fillStyle = "#fff";
    ctx.fillText(`燃料: ${Math.max(0, ship.fuel)}`, 20, 100);

    // リザルト表示
    if (gameState !== "PLAYING") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = gameState === "SUCCESS" ? "#0f0" : "#f33";
        ctx.font = "bold 30px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(message, canvas.width / 2, canvas.height / 2 - 20);
        
        ctx.fillStyle = "#fff";
        ctx.font = "20px sans-serif";
        ctx.fillText("【↑】キー か 【スペース】 で次へ挑戦（地形が変わります）", canvas.width / 2, canvas.height / 2 + 30);
        ctx.textAlign = "left";
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// 初回起動
resetGame();
loop();
</script>
</body>
</html>
